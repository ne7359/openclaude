name: PR Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: |
          bun run build
          # 创建输出目录，复制构建产物
          mkdir -p release-ready
          cp -r dist/* release-ready/ 2>/dev/null || cp -r dist release-ready/
          # 如果有 package.json，也打包成 tgz 便于分发
          npm pack --pack-destination ./release-ready/
          # 查看最终内容
          ls -la release-ready/

      - name: Smoke check
        run: bun run smoke

      - name: Full unit test suite
        run: bun test --max-concurrency=1

      - name: Suspicious PR intent scan
        run: bun run security:pr-scan -- --base ${{ github.event.pull_request.base.sha || 'origin/main' }}
      - name: Provider tests
        run: bun run test:provider

      - name: Provider recommendation tests
        run: npm run test:provider-recommendation

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaude
          path: ./release-ready/*
          retention-days: 30
