name: PR Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: |
          bun run build
          # 创建 release-ready 目录并打包
          mkdir -p release-ready
          npm pack --pack-destination release-ready

      - name: Install built package locally
        run: |
          PACKAGE_FILE=$(ls release-ready/*.tgz | head -n 1)
          echo "Installing: $PACKAGE_FILE"
          npm install -g "$PACKAGE_FILE"
          # 验证安装
          which openclaude
          openclaude --version

      - name: Smoke check
        run: bun run smoke

      - name: Provider tests
        run: bun run test:provider

      - name: Provider recommendation tests
        run: npm run test:provider-recommendation

      # ===== 上传构建产物 =====
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: openclaude-${{ github.sha }}-ubuntu
          path: ./release-ready/*
          retention-days: 30
