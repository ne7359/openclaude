name: PR Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ===== 新增：本地构建步骤 =====
      - name: Build package locally
        run: bun run build

      # ===== 新增：本地安装构建产物 =====
      - name: Install built package locally
        run: |
          # 打包构建产物为本地 tarball
          npm pack
          # 获取生成的包文件名（通常是 gitlawb-openclaude-x.x.x.tgz）
          PACKAGE_FILE=$(ls *.tgz | head -n 1)
          echo "Generated package: $PACKAGE_FILE"
          # 全局安装本地包，而不是从远程下载
          npm install -g "./$PACKAGE_FILE"
          # 验证安装
          which openclaude
          openclaude --version

      - name: Smoke check
        run: bun run smoke

      - name: Provider tests
        run: bun run test:provider

      - name: Provider recommendation tests
        run: npm run test:provider-recommendation
